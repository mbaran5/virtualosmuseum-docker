services:
  virtualosmuseum:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: virtualosmuseum
    restart: unless-stopped
    devices:
      - /dev/kvm:/dev/kvm
    volumes:
      - /path/to/vm/storage:/vm   # update this to wherever you extracted the museum files
    ports:
      - "8888:8080"   # noVNC browser UI — change 8888 if it conflicts
      - "8022:8022"   # SSH into the museum VM (optional, for troubleshooting)
    environment:
      - QEMU_RAM=8192   # MB — matches the upstream VirtualBox config
      - QEMU_CPUS=4     # vCPUs — matches the upstream VirtualBox config
    shm_size: "512m"
    cap_add:
      - NET_ADMIN
