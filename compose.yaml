services:
  virtualosmuseum:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: virtualosmuseum
    restart: unless-stopped
    devices:
      - /dev/kvm:/dev/kvm
    volumes:
      - /path/to/vm/storage:/vm
    ports:
      - 8888:8080 # noVNC browser UI - change 8888 if it conflicts
      - 8022:8022 # SSH into the museum VM (optional, useful for troubleshooting)
    environment:
      - QEMU_RAM=8192 # MB of RAM for the museum VM
      - QEMU_CPUS=4 # vCPUs
    # /dev/shm bump helps QEMU with large memory allocations
    shm_size: 512m
    cap_add:
      - NET_ADMIN # needed for QEMU user networking
